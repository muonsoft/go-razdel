name: Benchstat PR diff

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchstat-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Prepare base worktree
        run: git worktree add --detach ../base "${{ github.event.pull_request.base.sha }}"

      - name: Run benchmarks for base and head
        run: |
          set -euo pipefail
          (
            cd ../base
            go test -run=^$ -bench='Benchmark(Tokenize|Sentenize)' -benchmem -count=5 -benchtime=200ms . > ../bench-base.txt
          )
          go test -run=^$ -bench='Benchmark(Tokenize|Sentenize)' -benchmem -count=5 -benchtime=200ms . > bench-head.txt

      - name: Generate benchstat report
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/benchstat" bench-base.txt bench-head.txt > benchstat.txt
          {
            echo "### benchstat (base -> head)"
            echo '```text'
            cat benchstat.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchstat-${{ github.event.pull_request.number }}
          path: |
            bench-base.txt
            bench-head.txt
            benchstat.txt

      - name: Comment benchstat report on PR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- benchstat-report -->";
            const report = fs.readFileSync("benchstat.txt", "utf8").trim() || "(no benchstat output)";
            const baseSha = context.payload.pull_request.base.sha.slice(0, 7);
            const headSha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              `## Benchmark diff (${baseSha} -> ${headSha})`,
              "",
              "```text",
              report,
              "```",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Cleanup base worktree
        if: always()
        run: git worktree remove --force ../base
